<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="gothamBannerTitle gothamBannerDesc">
  <title id="gothamBannerTitle">Gotham Banner</title>
  <desc id="gothamBannerDesc">A night skyline-themed banner with a bat silhouette and the text Saqib, The Night Shift Builder.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#02030a"/>
      <stop offset="100%" stop-color="#0d1424"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#7df9ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0ff" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="280" fill="url(#sky)"/>

  <path d="M0 220 L70 180 L130 210 L185 155 L240 210 L300 175 L345 210 L400 145 L455 210 L520 170 L570 210 L640 160 L700 210 L760 180 L810 210 L875 165 L930 210 L980 185 L1035 210 L1110 170 L1200 220 V280 H0 Z" fill="#111a2c"/>
  <path d="M0 235 L80 205 L140 225 L210 185 L260 225 L335 195 L390 225 L455 175 L510 225 L585 190 L640 225 L715 185 L770 225 L840 200 L905 225 L975 195 L1040 225 L1120 200 L1200 235 V280 H0 Z" fill="#17233a"/>

  <path d="M495 90c20-22 40-34 62-33 19 1 34 10 49 24 16-12 31-17 47-13 16 4 30 16 42 37-17-6-32-6-45 0-12 6-24 17-35 34-11-17-23-28-36-34-13-6-28-6-44 0z" fill="#cdd5e6" opacity="0.9" filter="url(#softGlow)"/>

  <line x1="150" y1="220" x2="1050" y2="220" stroke="url(#glow)" stroke-width="2"/>

  <text x="600" y="120" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="56" font-weight="700" fill="#ecf1ff" letter-spacing="4">SAQIB</text>
  <text x="600" y="160" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#8aa1c8" letter-spacing="6">THE NIGHT SHIFT BUILDER</text>
</svg>
